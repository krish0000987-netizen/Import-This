name: Keep Alive

on:
  schedule:
    - cron: '*/15 * * * *'  # Run every 15 minutes
  workflow_dispatch:        # Allow manual triggering

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Server
        run: |
          curl -f ${{ secrets.SERVER_URL || 'https://YOUR-APP-NAME.onrender.com' }}
